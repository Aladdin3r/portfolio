backend:
  name: git-gateway
  branch: main

media_folder: "public"
public_folder: "/"

collections:
  - name: "projects"
    label: "Projects"
    folder: "src/content/projects"
    create: true
    slug: "{{fields.title | slugify}}"
    fields:
      - { label: "Title", name: "title", widget: "string" }
      - { label: "Tags / Category", name: "tags", widget: "string", hint: "e.g. UX Design | Development" }
      - { label: "Cover Image", name: "image", widget: "image" }
      - { label: "Image Alt Text", name: "imageAlt", widget: "string" }
      - { label: "Page URL", name: "url", widget: "string", hint: "e.g. /onward.html" }
      - { label: "Visible on Projects page", name: "visible", widget: "boolean", default: true }
      - { label: "Display Order", name: "order", widget: "number", default: 99, hint: "Lower = shown first" }
